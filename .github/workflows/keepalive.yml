name: Keepalive
# Prevents GitHub from auto-disabling scheduled workflows after 60 days
on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly (1st day)
  workflow_dispatch: {}

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keep workflows alive
        run: |
          echo "Keepalive ping at $(date -u)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: keepalive [skip ci]"
          git push
