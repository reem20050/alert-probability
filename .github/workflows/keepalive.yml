name: Keepalive
# Prevents GitHub from auto-disabling scheduled workflows
on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly (1st day) - well within 60-day GitHub limit
  workflow_dispatch: {}

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
